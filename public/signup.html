<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign up — BirthdayBot</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🎂 BirthdayBot</div>
    <p class="auth-subtitle">Create your free account</p>

    <div id="error" style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none"></div>

    <form id="signupForm">
      <div class="form-group">
        <label>Your name</label>
        <input type="text" id="name" placeholder="John Smith" required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 8 characters" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">
        Create free account
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--gray)">
      Already have an account? <a href="/login.html">Log in</a>
    </p>
    <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--gray)">
      By signing up you agree to our terms of service.
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errEl.style.display = 'none';

      try {
        const data = await API.post('/auth/register', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create free account';
      }
    });
  </script>
</body>
</html>
