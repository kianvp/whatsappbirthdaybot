<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Log in — BirthdayBot</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🎂 BirthdayBot</div>
    <p class="auth-subtitle">Welcome back</p>

    <div id="error" style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">Log in</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--gray)">
      Don't have an account? <a href="/signup.html">Sign up free</a>
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errEl.style.display = 'none';

      try {
        const data = await API.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = data.is_admin ? '/admin.html' : '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
